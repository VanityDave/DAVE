<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanityDave's Fanpage</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at 50% 20%, rgba(212,175,55,0.35), transparent 30%),
    linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0%,
        rgba(255,255,255,0.04) 20%,
        transparent 20%,
        transparent 40%,
        rgba(255,255,255,0.06) 40%,
        rgba(255,255,255,0.02) 60%,
        transparent 60%
    ),
    linear-gradient(160deg,#050505,#191919 45%,#060606);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        120deg,
        rgba(255,255,255,.15),
        transparent 25%,
        rgba(212,175,55,.12) 45%,
        transparent 65%,
        rgba(255,255,255,.08)
    );
    pointer-events:none;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    width:90%;
    max-width:550px;
}

h1{
    color:#f5c542;
    font-size:3.2rem;
    font-weight:900;
    text-shadow:
        0 4px 0 #000,
        0 0 20px rgba(212,175,55,.6);
    margin-bottom:40px;
}

.button{
    display:block;
    width:100%;
    padding:22px;
    margin:18px 0;
    border:none;
    border-radius:20px;
    font-size:2rem;
    font-weight:900;
    cursor:pointer;
    text-decoration:none;
    color:#050505;
    background:linear-gradient(#f7d56a,#b8860b);
    border:3px solid white;
    box-shadow:
        0 8px 0 #4a2f00,
        0 0 20px rgba(245,197,66,.6);
    transition:.15s;
}

.button:hover{
    transform:scale(1.02);
}

.button:active{
    transform:translateY(4px);
    box-shadow:
        0 4px 0 #4a2f00,
        0 0 15px rgba(245,197,66,.6);
}
</style>

</head>
<body>

<div class="container">

<h1>VanityDave's Fanpage</h1>

<a class="button" href="game.html">
Tower Defense
</a>

<a class="button" href="youtube.html">
YouTube Videos
</a>

</div>

</body>
</html>
